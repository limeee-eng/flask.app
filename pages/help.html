<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>帮助中心</title>
</head>
<body>
    <h2>帮助中心</h2>
    <p>欢迎使用用户管理系统！以下是一些常见问题的解答：</p>

    <h3>如何登录？</h3>
    <p>在登录页面输入您的用户名和密码即可登录。默认管理员账号为 admin，密码为 admin123。</p>

    <h3>如何注册？</h3>
    <p>点击导航栏的"注册"链接，填写用户名、密码、邮箱和手机号即可完成注册。</p>

    <h3>如何搜索用户？</h3>
    <p>登录后在首页的搜索框中输入关键词，可以按用户名或邮箱搜索其他用户。</p>

    <h3>如何上传头像？</h3>
    <p>登录后点击导航栏的"上传头像"链接，选择图片文件即可上传。</p>

    <h3>如何充值？</h3>
    <p>登录后进入"个人中心"，在充值表单中输入金额即可完成充值。</p>

    <h3>联系支持</h3>
    <p>如有其他问题，请联系系统管理员。</p>
</body>
</html>
