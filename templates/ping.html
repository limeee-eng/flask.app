{% extends "base.html" %}
{% block content %}

<div class="card">
    <h2 class="card-title">Ping 网络诊断</h2>

    <form method="POST" action="/ping">
        <div class="form-group">
            <label class="form-label" for="ip">目标 IP 地址</label>
            <input class="form-input" type="text" id="ip" name="ip" placeholder="例如：8.8.8.8" value="{{ ip if ip else '' }}" required>
        </div>
        <button type="submit" class="btn btn-block">Ping</button>
    </form>

    {% if result %}
    <div style="margin-top: 24px;">
        <h3 style="font-size: 14px; color: #555; margin-bottom: 8px;">执行结果</h3>
        <pre style="background: #1a1a2e; color: #00ff00; padding: 20px; border-radius: 8px; font-size: 13px; font-family: 'Courier New', monospace; line-height: 1.6; max-height: 500px; overflow: auto; white-space: pre-wrap; word-break: break-all;">{{ result | e }}</pre>
    </div>
    {% endif %}
</div>

{% endblock %}
