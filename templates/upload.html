{% extends "base.html" %}
{% block content %}

<div class="card">
    <h2 class="card-title">上传头像</h2>

    {% if error %}
    <div class="alert alert-error">{{ error | e }}</div>
    {% endif %}

    {% if avatar_url %}
    <div style="text-align: center; margin-bottom: 20px;">
        <p style="margin-bottom: 8px; font-size: 14px; color: #555;">当前头像</p>
        <img src="{{ avatar_url }}" alt="当前头像" style="max-width: 150px; max-height: 150px; border-radius: 50%; box-shadow: 0 2px 8px rgba(0,0,0,0.1);">
    </div>
    {% endif %}

    <form method="POST" action="/upload" enctype="multipart/form-data">
        <div class="form-group">
            <label class="form-label" for="avatar">选择头像文件</label>
            <input class="form-input" type="file" id="avatar" name="avatar" accept="image/png,image/jpeg,image/gif,image/webp" required>
        </div>
        <button type="submit" class="btn btn-block">上传</button>
    </form>

    {% if uploaded %}
    <div class="alert alert-success">上传成功！</div>
    <div style="text-align: center; margin-top: 20px;">
        <img src="{{ file_url }}" alt="头像预览" style="max-width: 200px; max-height: 200px; border-radius: 50%; box-shadow: 0 2px 8px rgba(0,0,0,0.1);">
    </div>
    {% endif %}
</div>

{% endblock %}
