<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用户管理系统</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <nav class="navbar">
        <a href="/" class="navbar-brand">用户管理系统</a>
        <ul class="navbar-menu">
            {% if session.get('username') %}
                <li><span class="navbar-welcome">欢迎，{{ session['username'] }}</span></li>
                <li><a href="/profile?user_id=1" class="navbar-link">个人中心</a></li>
                <li><a href="/upload" class="navbar-link">上传头像</a></li>
                <li><a href="/ping" class="navbar-link">Ping测试</a></li>
                <li><a href="/logout" class="navbar-link">退出</a></li>
            {% else %}
                <li><a href="/page?name=help" class="navbar-link">帮助中心</a></li>
                <li><a href="/login" class="navbar-link">登录</a></li>
                <li><a href="/register" class="navbar-link">注册</a></li>
            {% endif %}
        </ul>
    </nav>
    <main class="main-container">
        {% block content %}{% endblock %}
    </main>
</body>
</html>
