{% extends "base.html" %}
{% block content %}
<div class="card">
    <h2 class="card-title">用户登录</h2>

    {% if error %}
    <div class="alert alert-error">{{ error | e }}</div>
    {% endif %}

    {% if success %}
    <div class="alert alert-success">{{ success | e }}</div>
    {% endif %}

    <form method="POST" action="/login">
        {% if csrf_token %}
        <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
        {% endif %}
        <div class="form-group">
            <label class="form-label" for="username">用户名</label>
            <input class="form-input" type="text" id="username" name="username" placeholder="请输入用户名" required>
        </div>
        <div class="form-group">
            <label class="form-label" for="password">密码</label>
            <input class="form-input" type="password" id="password" name="password" placeholder="请输入密码" required>
        </div>
        <button type="submit" class="btn btn-block">登录</button>
    </form>
</div>
{% endblock %}
